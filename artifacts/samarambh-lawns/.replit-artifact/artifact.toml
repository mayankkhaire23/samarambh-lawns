kind = "web"
previewPath = "/"
title = "Samarambh Lawns"
version = "1.0.0"
id = "artifacts/samarambh-lawns"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22953

[services.development]
run = "pnpm --filter @workspace/samarambh-lawns run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/samarambh-lawns", "run", "build" ]
publicDir = "artifacts/samarambh-lawns/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22953"
BASE_PATH = "/"
